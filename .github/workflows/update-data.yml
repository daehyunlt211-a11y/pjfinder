name: 공고 데이터 자동 수집

# 주의: 기업마당 API는 해외 IP를 차단해 GitHub 서버(미국)에서는 접속이 안 됨.
# 데이터 수집은 로컬 PC에서 scripts/update_data.ps1 로 실행한다.
# 이 워크플로는 수동 실행(테스트)용으로만 남겨둠.
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 기업마당 API에서 공고 수집
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
        run: python scripts/fetch_bizinfo.py

      - name: 변경사항 커밋
        run: |
          git config user.name "pjfinder-bot"
          git config user.email "actions@github.com"
          git add data/announcements.json
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "데이터 자동 갱신: $(date +'%Y-%m-%d')"
            git push
          fi
