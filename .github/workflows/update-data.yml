name: 공고 데이터 자동 수집

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 기업마당 API에서 공고 수집
        env:
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
        run: python scripts/fetch_bizinfo.py

      - name: 변경사항 커밋
        run: |
          git config user.name "pjfinder-bot"
          git config user.email "actions@github.com"
          git add data/announcements.json
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "데이터 자동 갱신: $(date +'%Y-%m-%d')"
            git push
          fi
